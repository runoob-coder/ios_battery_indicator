name: ios_battery_indicator
description: "A Flutter widget that replicates the native iOS battery indicator, including support for iOS 27 style and automatic system battery monitoring."
version: 1.2.1
homepage: https://runoob-coder.github.io/ios_battery_indicator/
repository: https://github.com/runoob-coder/ios_battery_indicator
issue_tracker: https://github.com/runoob-coder/ios_battery_indicator/issues
topics:
  - battery-indicator
  - cupertino
  - widget
  - ui
  - components

screenshots:
  - description: "80% Charging - Show Battery Percentage"
    path: screenshots/1.png
  - description: "65% Discharging - Show Battery Percentage"
    path: screenshots/2.png
  - description: "90% Charging"
    path: screenshots/3.png
  - description: "20% Discharging - Low Battery Warning"
    path: screenshots/4.png

include:
  - pubspec.yaml
  - CHANGELOG.md
  - LICENSE
  - README.md
  - README_CN.md
  - analysis_options.yaml
  - lib/
  - test/
  - example/lib/
  - screenshots/

environment:
  sdk: ^3.10.0
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter

  battery_plus: ^7.1.0
  device_info_plus: ^13.2.0
  version: ^3.0.2
  cutout: ^1.0.2
  ios_system_sound: ^0.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

